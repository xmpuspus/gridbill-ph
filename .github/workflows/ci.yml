name: ci
on:
  push: {}
  pull_request: {}

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Lint
        run: pipx run ruff check .
      - name: Bake from the committed archive
        run: python3 pipeline/build_data.py
      - name: Data pins + banned-framing gate
        run: |
          python3 tests/test_data.py
          python3 tests/qa_gate.py
      - name: Behavioral checks against a local server
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q zsh
          (cd web && python3 serve.py 8789 &)
          sleep 2
          zsh tests/e2e.sh http://localhost:8789
